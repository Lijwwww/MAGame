# used to create the object
name: RoboGame

physics_engine: ${..physics_engine}

# if given, will override the device setting in gym. 
env:
  numEnvs: ${resolve_default:2,${...num_envs}}
  envSpacing: 21.0
  maxEpisodeLength: 50  # 200 # 20

  clipObservations: 5.0
  clipActions: 5.0
  controlFrequencyInv: 1 #180 # 3

  numAgents: ${...num_agents}

sim:
  dt: 0.016667 # 1/60 s  0.0083 # 1/120 s
  # dt: 0.0083 # 1/60 s  0.0083 # 1/120 s
  use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
  gravity: [0.0, 0.0, -9.81]
  add_ground_plane: False
  add_distant_light: True
  use_flatcache: True
  enable_scene_query_support: True # False
  disable_contact_processing: False

  # set to True if you use camera sensors in the environment
  enable_cameras: False

  default_physics_material:
    static_friction: 0.2 #0.2 #0.5 #0.3 # 0.1
    dynamic_friction: 1.0 #1.0 #2.0 #1.2 # 0.5
    restitution: 0.0

  physx:
    worker_thread_count: ${....num_threads}
    solver_type: 0 #${....solver_type}
    use_gpu: ${eq:${....sim_device},"gpu"} # set to False to run on CPU
    solver_position_iteration_count: 4 # 6
    solver_velocity_iteration_count: 0 # 0
    contact_offset: 0.02
    rest_offset: 0.001
    bounce_threshold_velocity: 0.2
    friction_offset_threshold: 0.04
    friction_correlation_distance: 0.025
    enable_sleeping: True
    enable_stabilization: True # True # False
    max_depenetration_velocity: 1000.0 # 100.0 # 1000.0

    # GPU buffers
    gpu_max_rigid_contact_count: 4194304 # 524288
    gpu_max_rigid_patch_count: 33554432
    gpu_found_lost_pairs_capacity: 4194304 # 1024
    gpu_found_lost_aggregate_pairs_capacity: 33554432 # 262144
    gpu_total_aggregate_pairs_capacity: 4194304 # 1024
    gpu_max_soft_body_contacts: 1048576
    gpu_max_particle_contacts: 1048576
    gpu_heap_capacity: 134217728
    gpu_temp_buffer_capacity: 33554432
    gpu_max_num_partitions: 8

  robot:
    # -1 to use default values
    override_usd_defaults: False
    enable_self_collisions: False
    enable_gyroscopic_forces: True
    # also in stage params
    # per-actor
    solver_position_iteration_count: 0
    solver_velocity_iteration_count: 8
    # Mass-normalized kinetic energy threshold below which an actor may go to sleep.
    sleep_threshold: 0.005
     # Mass-normalized kinetic energy threshold below which an actor may participate in stabilization. Allowed range [0, max_float).
    stabilization_threshold: 0.001
    # per-body
    density: -1 # -1
    max_depenetration_velocity: 1000.0
    # per-shape
    contact_offset: 0.02
    rest_offset: 0.0


  # arena:
